# Content inspection rules for the TLS proxy
#
# Each rule checks request/response bodies against a regex pattern.
# Actions: alert (log only), block (reject request)
#
# These rules run inside the proxy container when SANDBOX_PROXY_MODE=proxy.

rules: []

