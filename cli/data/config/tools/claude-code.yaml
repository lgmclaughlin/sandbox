# Claude Code tool definition
name: claude-code
description: Anthropic's CLI for Claude
default: true

install:
  method: npm
  package: "@anthropic-ai/claude-code"
  global: true
  auto: true

auth:
  command: claude auth login
  sync:
    host: ~/.claude
    container: /home/node/.claude
    files:
      - "*.json"
      - ".credentials*"

firewall:
  domains:
    - api.anthropic.com
    - console.anthropic.com
    - registry.npmjs.org

env:
  ANTHROPIC_API_KEY: ""

mcp:
  config_path: /home/node/.claude/mcp-config.json

volumes:
  - container: /home/node/.claude
    named: claude_config
