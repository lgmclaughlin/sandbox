[global]
logfile="/var/log/ulogd.log"
loglevel=5

plugin="/usr/lib/x86_64-linux-gnu/ulogd/ulogd_inppkt_NFLOG.so"
plugin="/usr/lib/x86_64-linux-gnu/ulogd/ulogd_raw2packet_BASE.so"
plugin="/usr/lib/x86_64-linux-gnu/ulogd/ulogd_filter_IFINDEX.so"
plugin="/usr/lib/x86_64-linux-gnu/ulogd/ulogd_filter_IP2STR.so"
plugin="/usr/lib/x86_64-linux-gnu/ulogd/ulogd_filter_PRINTPKT.so"
plugin="/usr/lib/x86_64-linux-gnu/ulogd/ulogd_output_LOGEMU.so"

stack=allow:NFLOG,base1:BASE,ifi1:IFINDEX,ip2str1:IP2STR,pkt1:PRINTPKT,out1:LOGEMU
stack=block:NFLOG,base2:BASE,ifi2:IFINDEX,ip2str2:IP2STR,pkt2:PRINTPKT,out2:LOGEMU

[allow]
group=1

[base1]
[ifi1]
[ip2str1]
[pkt1]

[out1]
file="/var/log/sandbox/firewall/ulogd_allow.log"
sync=1

[block]
group=2

[base2]
[ifi2]
[ip2str2]
[pkt2]

[out2]
file="/var/log/sandbox/firewall/ulogd_block.log"
sync=1
